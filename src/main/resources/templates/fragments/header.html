<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<div th:fragment="header">
    <header>
        <nav>
            <a th:href="@{/}" class="logo">
                <img th:src="@{/img/logo.png}" alt="Logo M-Motors" class="header-logo">
            </a>

            <div class="nav-links">
                <a th:href="@{/vehicules}">Véhicules</a>
                <a th:href="@{/services}">Services</a>
                <a th:href="@{/contact}">Contact</a>
            </div>

            <div class="auth-buttons" sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn-login">Se connecter</a>
                <a th:href="@{/inscription}" class="btn-register">S'inscrire</a>
            </div>

            <div class="user-menu" sec:authorize="isAuthenticated()">
                <div class="user-badge">
                    <span class="user-avatar"
                          th:text="${#authentication != null ? #strings.substring(#authentication.name,0,1).toUpperCase() : 'U'}">U</span>

                    <div class="user-dropdown">
                        <span class="user-name"
                              th:text="${#authentication != null ? #authentication.name : 'utilisateur@email.com'}">utilisateur@email.com</span>

                        <a th:href="@{/client/dashboard}" sec:authorize="hasRole('CLIENT')">Mon espace client</a>
                        <a th:href="@{/dossiers}" sec:authorize="hasRole('CLIENT')">Mes dossiers</a>

                        <a th:href="@{/admin/dashboard}" sec:authorize="hasRole('ADMIN')">Dashboard admin</a>
                        <a th:href="@{/admin/dossiers}" sec:authorize="hasRole('ADMIN')">Gérer les dossiers</a>

                        <form th:action="@{/logout}" method="post" style="display:inline;">
                            <button type="submit" class="logout-link">Déconnexion</button>
                        </form>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</div>
</body>
</html>
