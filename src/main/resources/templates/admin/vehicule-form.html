<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire véhicule - M-Motors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header class="admin-header">
    <nav>
        <a th:href="@{/admin/dashboard}">Tableau de bord</a>
        <a th:href="@{/admin/dossiers}">Gérer les dossiers</a>
        <a th:href="@{/admin/vehicules}">Gérer les véhicules</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit">Déconnexion</button>
        </form>
    </nav>
</header>

<main>
    <div class="form-container">
        <h1 th:text="${vehicle.id == null ? 'Ajouter un véhicule' : 'Modifier un véhicule'}">
            Formulaire véhicule
        </h1>

        <form th:action="@{/admin/vehicules/save}" th:object="${vehicle}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label>Marque</label>
                <input type="text" th:field="*{marque}" required>
            </div>

            <div class="form-group">
                <label>Modèle</label>
                <input type="text" th:field="*{modele}" required>
            </div>

            <div class="form-group">
                <label>Année</label>
                <input type="number" th:field="*{annee}">
            </div>

            <div class="form-group">
                <label>Kilométrage</label>
                <input type="number" th:field="*{kilometrage}">
            </div>

            <div class="form-group">
                <label>Prix d'achat</label>
                <input type="number" step="0.01" th:field="*{prixAchat}">
            </div>

            <div class="form-group">
                <label>Loyer mensuel</label>
                <input type="number" step="0.01" th:field="*{loyerMensuel}">
            </div>

            <div class="form-group">
                <label>Type d'offre</label>
                <select th:field="*{typeOffre}" required>
                    <option value="">-- Choisir --</option>
                    <option th:each="type : ${typesOffre}"
                            th:value="${type}"
                            th:text="${type}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label>URL photo</label>
                <input type="text" th:field="*{photoUrl}" placeholder="/img/voiture.jpg">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Enregistrer</button>
                <a th:href="@{/admin/vehicules}" class="btn-secondary">Retour</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
