<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Nouveau Dossier - M-Motors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="client-body">

<div th:replace="~{fragments/header :: header}"></div>

<main class="dossier-create-page">
    <div class="dossier-create-wrapper">

        <div class="dossier-create-header">
            <p class="kicker">Nouvelle demande</p>
            <h1>Nouveau dossier</h1>
            <p>Choisissez un véhicule et le type d’offre souhaité pour lancer votre demande.</p>
        </div>

        <div class="dossier-form-card">
            <form th:action="@{/dossiers}" method="post">

                <div class="form-group">
                    <label for="typeOffre">Type d'offre *</label>
                    <select id="typeOffre" name="typeOffre" required>
                        <option value="">Sélectionnez...</option>
                        <option value="ACHAT">Achat</option>
                        <option value="LLD">Location longue durée</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="vehiculeId">Véhicule souhaité *</label>
                    <select id="vehiculeId" name="vehiculeId" required>
                        <option value="">Sélectionnez un véhicule...</option>
                        <option th:each="vehicule : ${vehicules}"
                                th:value="${vehicule.id}"
                                th:text="${vehicule.marque + ' ' + vehicule.modele + ' - ' + vehicule.prixAchat + ' €'}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="budget">Budget maximum (€)</label>
                    <input type="number" id="budget" name="budget" placeholder="Optionnel">
                </div>

                <div class="form-group">
                    <label for="commentaire">Commentaires</label>
                    <textarea id="commentaire"
                              name="commentaire"
                              rows="4"
                              placeholder="Précisez vos attentes, vos besoins particuliers..."></textarea>
                </div>

                <div class="dossier-form-actions">
                    <button type="submit" class="btn-primary">Créer le dossier</button>
                    <a th:href="@{/client/dashboard}" class="btn-secondary">Annuler</a>
                </div>

            </form>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
