<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détail du véhicule - M-Motors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="vehicle-detail-page">
    <div class="container">

        <div th:if="${vehicule != null}" class="vehicle-detail-grid">

            <div class="vehicle-detail-image-card">
                <img th:src="${vehicule.photoUrl != null ? vehicule.photoUrl : '/img/fond.jpg'}"
                     alt="Photo véhicule"
                     class="vehicle-detail-image">
            </div>

            <div class="vehicle-detail-info-card">
                <p class="vehicle-detail-kicker">Véhicule premium</p>

                <h1 th:text="${vehicule.marque + ' ' + vehicule.modele}">
                    BMW Série 5
                </h1>

                <p class="vehicle-detail-description" th:text="${vehicule.description}">
                    Description du véhicule
                </p>

                <div class="vehicle-detail-specs">
                    <div class="detail-spec-box">
                        <span class="detail-spec-label">Année</span>
                        <span class="detail-spec-value" th:text="${vehicule.annee}">2023</span>
                    </div>

                    <div class="detail-spec-box">
                        <span class="detail-spec-label">Kilométrage</span>
                        <span class="detail-spec-value" th:text="${vehicule.kilometrage + ' km'}">15000 km</span>
                    </div>

                    <div class="detail-spec-box">
                        <span class="detail-spec-label">Offre</span>
                        <span class="detail-spec-value" th:text="${vehicule.typeOffre}">ACHAT</span>
                    </div>
                </div>

                <div class="vehicle-detail-pricing">
                    <div class="detail-price-card" th:if="${vehicule.prixAchat != null}">
                        <span class="detail-price-label">Prix achat</span>
                        <span class="detail-price-value" th:text="${vehicule.prixAchat + ' €'}">72000 €</span>
                    </div>

                    <div class="detail-price-card" th:if="${vehicule.loyerMensuel != null}">
                        <span class="detail-price-label">Loyer mensuel</span>
                        <span class="detail-price-value" th:text="${vehicule.loyerMensuel + ' € / mois'}">850 € / mois</span>
                    </div>
                </div>

                <div class="vehicle-detail-actions">
                    <a th:href="@{/dossiers/nouveau}" class="btn-primary">
                        Déposer un dossier
                    </a>

                    <a th:href="@{/vehicules}" class="btn-outline-dark">
                        Retour à la liste
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${vehicule == null}" class="form-container">
            <h1>Véhicule introuvable</h1>
            <a th:href="@{/vehicules}" class="btn-secondary">Retour à la liste</a>
        </div>

    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
