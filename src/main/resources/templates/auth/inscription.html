<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - M-Motors</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <main>
        <div class="container">
            <div class="form-container">
                <h1>Créer un compte</h1>

                <!-- Affichage des erreurs -->
                <div th:if="${param.error == 'password_mismatch'}" class="alert alert-danger">
                    Les mots de passe ne correspondent pas. Veuillez réessayer.
                </div>
                <div th:if="${param.error == 'email_exists'}" class="alert alert-danger">
                    Un compte avec cette adresse email existe déjà. <a th:href="@{/login}">Connectez-vous</a>.
                </div>

                <form th:action="@{/register}" method="post" class="auth-form">
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" required>
                    </div>

                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirmer le mot de passe</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn-primary">S'inscrire</button>
                    </div>
                </form>

                <p class="auth-switch">
                    Déjà un compte ? <a th:href="@{/login}">Connectez-vous</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
