# ===================================================================
# Configuration générale de l'application
# ===================================================================
server.port=8081
server.servlet.context-path=/

# ===================================================================
# Configuration H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:file:./data/m-motors-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update

# Activation de la console H2 pour visualiser les données
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuration JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# Configuration de Thymeleaf (templates HTML)
# ===================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ===================================================================
# Configuration des fichiers statiques (CSS, JS, images)
# ===================================================================
spring.web.resources.static-locations=classpath:/static/

# ===================================================================
# Configuration de la journalisation (logs)
# ===================================================================
logging.level.root=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR